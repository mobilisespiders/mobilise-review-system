services:
  - type: web
    name: mti-backend
    runtime: python
    rootDir: backend
    # SMTP ports are blocked on Render Free web services.
    # Use a paid instance type if this backend must send Gmail SMTP emails.
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL_CA_PATH
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: ALLOWED_ORIGINS
        sync: false
